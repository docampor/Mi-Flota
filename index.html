<!DOCTYPE html>
<html lang="es-AR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
    <meta name="theme-color" content="#18170F">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Mi Flota">
    <meta name="description" content="Seguimiento completo del mantenimiento de tu moto">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <title>Mi Flota</title>
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        :root {
            --bg: #FAF8F5;
            --surface: #FFFFFF;
            --surface-2: #F2EFE9;
            --surface-3: #E8E3DA;
            --border: rgba(139, 115, 85, 0.12);
            --border-md: rgba(139, 115, 85, 0.22);
            --text: #2C2416;
            --text-2: #5C4E3A;
            --muted: #9C8E7A;
            --ok: #4A7C59;
            --ok-bg: #EDF4F0;
            --ok-border: rgba(74, 124, 89, 0.2);
            --warn: #A06830;
            --warn-bg: #FDF4E9;
            --warn-border: rgba(160, 104, 48, 0.22);
            --due: #C0392B;
            --due-bg: #FDF0EE;
            --due-border: rgba(192, 57, 43, 0.2);
            --accent: #6B4F35;
            --accent-light: #8B6545;
            --radius: 18px;
            --radius-sm: 12px;
            --radius-xs: 8px;
            --shadow: 0 2px 12px rgba(44, 36, 22, 0.08);
            --shadow-md: 0 4px 20px rgba(44, 36, 22, 0.12);
            --banner-bg: #2C2416;
            --banner-text: #F2EFE9;
            --banner-muted: #9C8E7A;
            --nav-h: 72px;
            --header-h: 68px
        }

        @media(prefers-color-scheme:dark) {
            :root {
                --bg: #1A1610;
                --surface: #231E16;
                --surface-2: #2D2720;
                --surface-3: #38302A;
                --border: rgba(200, 180, 150, 0.1);
                --border-md: rgba(200, 180, 150, 0.18);
                --text: #EDE8DF;
                --text-2: #C4B8A8;
                --muted: #8A7E6E;
                --ok: #5A9E6F;
                --ok-bg: #1A2D20;
                --ok-border: rgba(90, 158, 111, 0.25);
                --warn: #D4894A;
                --warn-bg: #2A1F12;
                --warn-border: rgba(212, 137, 74, 0.25);
                --due: #E05C4B;
                --due-bg: #2A1512;
                --due-border: rgba(224, 92, 75, 0.25);
                --accent: #C4A882;
                --accent-light: #D4B892;
                --banner-bg: #2D2720;
                --banner-text: #EDE8DF;
                --banner-muted: #8A7E6E
            }
        }

        html {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 15px;
            color: var(--text);
            background: var(--bg);
            -webkit-tap-highlight-color: transparent;
            overflow-x: hidden
        }

        body {
            max-width: 430px;
            margin: 0 auto;
            padding-bottom: 88px;
            min-height: 100dvh;
            position: relative
        }

        .mono {
            font-family: 'DM Mono', monospace
        }

        input,
        textarea,
        select,
        button {
            font-family: inherit;
            font-size: inherit;
            color: inherit;
            border: none;
            outline: none;
            background: none
        }

        button {
            cursor: pointer
        }

        a {
            color: inherit;
            text-decoration: none
        }

        /* SKELETON */
        #skeleton {
            position: fixed;
            inset: 0;
            z-index: 200;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 24px 20px
        }

        #skeleton.hide {
            opacity: 0;
            pointer-events: none;
            transition: opacity .3s ease
        }

        .sk-block {
            background: var(--surface-2);
            border-radius: var(--radius-sm);
            width: 100%;
            max-width: 430px;
            animation: pulse 1.2s ease-in-out infinite
        }

        .sk-h {
            height: 60px;
            margin-bottom: 12px
        }

        .sk-banner {
            height: 80px;
            margin-bottom: 16px;
            border-radius: var(--radius)
        }

        .sk-card {
            height: 120px;
            margin-bottom: 12px;
            border-radius: var(--radius)
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: .5
            }

            50% {
                opacity: 1
            }
        }

        /* HEADER */
        #hdr {
            position: sticky;
            top: 0;
            z-index: 100;
            background: color-mix(in srgb, var(--bg) 88%, transparent);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            min-height: var(--header-h);
            border-bottom: 1px solid var(--border)
        }

        #hdr .photo {
            width: 46px;
            height: 46px;
            border-radius: 14px;
            background: var(--surface-2);
            border: 1.5px solid var(--border-md);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            cursor: pointer;
            flex-shrink: 0;
            transition: all 150ms ease;
            box-shadow: var(--shadow)
        }

        #hdr .photo:hover {
            border-color: var(--accent);
            transform: scale(1.04)
        }

        #hdr .photo img {
            width: 100%;
            height: 100%;
            object-fit: cover
        }

        #hdr .info {
            flex: 1;
            min-width: 0
        }

        #hdr .moto-name {
            font-size: 16px;
            font-weight: 700;
            outline: none;
            display: block;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            border-bottom: 1.5px solid transparent;
            transition: border-color 150ms ease;
            padding: 2px 0
        }

        #hdr .moto-name:focus {
            border-color: var(--accent)
        }

        #hdr .subtitle {
            font-size: 11.5px;
            color: var(--muted);
            margin-top: 2px;
            font-weight: 500
        }

        .status-chip {
            font-size: 11px;
            font-weight: 700;
            padding: 5px 11px;
            border-radius: 20px;
            white-space: nowrap;
            flex-shrink: 0;
            letter-spacing: .2px
        }

        .status-chip.ok {
            background: var(--ok-bg);
            color: var(--ok);
            border: 1px solid var(--ok-border)
        }

        .status-chip.due {
            background: var(--due-bg);
            color: var(--due);
            border: 1px solid var(--due-border)
        }

        .garage-row {
            display: flex;
            gap: 8px;
            padding: 0 16px 12px;
            background: var(--surface-0);
            border-bottom: 1px solid var(--border)
        }

        .garage-select {
            flex: 1;
            min-width: 0;
            padding: 10px 12px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text);
            font-weight: 700
        }

        .garage-row .btn {
            width: auto;
            white-space: nowrap;
            padding: 10px 13px
        }

        /* BANNER */
        #bnr {
            background: var(--banner-bg);
            color: var(--banner-text);
            padding: 14px 16px;
            font-size: 13px;
            line-height: 1.6;
            position: relative
        }

        #bnr .banner-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 2px
        }

        #bnr .banner-list li {
            display: flex;
            align-items: center;
            gap: 6px
        }

        #bnr .banner-list li::before {
            content: '';
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: var(--banner-muted);
            flex-shrink: 0
        }

        #bnr .edit-btn {
            position: absolute;
            top: 10px;
            right: 12px;
            color: var(--banner-muted);
            font-size: 12px;
            padding: 4px 8px;
            border-radius: var(--radius-xs);
            transition: background 150ms ease
        }

        #bnr .edit-btn:hover {
            background: rgba(255, 255, 255, 0.08)
        }

        #bnr textarea {
            width: 100%;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: var(--radius-xs);
            color: var(--banner-text);
            padding: 10px;
            font-size: 13px;
            line-height: 1.6;
            resize: vertical;
            min-height: 100px;
            font-family: inherit
        }

        /* NAV */
        #nav {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 430px;
            background: color-mix(in srgb, var(--surface) 92%, transparent);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-around;
            padding: 6px 8px env(safe-area-inset-bottom, 10px);
            z-index: 100;
            height: var(--nav-h)
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            min-width: 52px;
            min-height: 52px;
            color: var(--muted);
            transition: all 150ms ease;
            cursor: pointer;
            -webkit-user-select: none;
            user-select: none;
            position: relative;
            border-radius: var(--radius-sm);
            padding: 0 10px
        }

        .nav-item svg {
            width: 21px;
            height: 21px;
            transition: transform 150ms ease
        }

        .nav-item span {
            font-size: 10px;
            font-weight: 600;
            letter-spacing: .2px
        }

        .nav-item.active {
            color: var(--accent);
            background: var(--surface-2)
        }

        .nav-item.active svg {
            transform: scale(1.08)
        }

        .nav-item.active::after {
            content: '';
            position: absolute;
            bottom: 6px;
            left: 50%;
            transform: translateX(-50%);
            width: 18px;
            height: 3px;
            border-radius: 2px;
            background: var(--accent)
        }

        .nav-item.active.has-due::after {
            background: var(--due)
        }

        .nav-item.active.has-due {
            color: var(--due)
        }

        /* MAIN */
        .tab {
            display: none;
            padding: 16px
        }

        .tab.active {
            display: block
        }

        /* CARDS */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            margin-bottom: 12px;
            overflow: hidden;
            transition: all 150ms ease;
            box-shadow: var(--shadow)
        }

        @media(hover:hover) {
            .card:hover {
                border-color: var(--border-md);
                box-shadow: var(--shadow-md)
            }
        }

        .card-header {
            display: flex;
            align-items: center;
            padding: 15px 16px;
            gap: 12px;
            cursor: pointer;
            -webkit-user-select: none;
            user-select: none
        }

        .card-header .name {
            font-weight: 600;
            font-size: 14px;
            flex: 1;
            letter-spacing: .1px
        }

        .card-header .chevron {
            width: 18px;
            height: 18px;
            color: var(--muted);
            transition: transform 300ms ease;
            flex-shrink: 0
        }

        .card-header .chevron.open {
            transform: rotate(180deg)
        }

        .card-body {
            max-height: 0;
            overflow: hidden;
            transition: max-height 300ms ease
        }

        .card-body.open {
            max-height: 2000px
        }

        .card-body-inner {
            padding: 0 16px 16px
        }

        .badge {
            font-size: 10.5px;
            font-weight: 700;
            padding: 3px 9px;
            border-radius: 20px;
            white-space: nowrap;
            letter-spacing: .2px
        }

        .badge.ok {
            background: var(--ok-bg);
            color: var(--ok);
            border: 1px solid var(--ok-border)
        }

        .badge.warn {
            background: var(--warn-bg);
            color: var(--warn);
            border: 1px solid var(--warn-border)
        }

        .badge.due {
            background: var(--due-bg);
            color: var(--due);
            border: 1px solid var(--due-border)
        }

        .badge.none {
            background: var(--surface-2);
            color: var(--muted);
            border: 1px solid var(--border)
        }

        .progress-bar {
            height: 4px;
            background: var(--surface-2);
            border-radius: 3px;
            margin: 0 16px 10px;
            overflow: hidden
        }

        .progress-fill {
            height: 100%;
            border-radius: 3px;
            transition: width 300ms ease
        }

        .remaining-text {
            font-size: 11.5px;
            color: var(--muted);
            padding: 6px 16px 2px;
            font-family: 'DM Mono', monospace
        }

        /* HERO CARD */
        .hero {
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-light) 100%);
            color: #FAF8F5;
            border-radius: var(--radius);
            padding: 28px 24px;
            text-align: center;
            margin-bottom: 16px;
            box-shadow: 0 6px 24px rgba(107, 79, 53, 0.28);
            position: relative;
            overflow: hidden
        }

        .hero::before {
            content: '';
            position: absolute;
            top: -30px;
            right: -30px;
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: rgba(255, 255, 255, .06);
            pointer-events: none
        }

        .hero .label {
            font-size: 11px;
            font-weight: 700;
            opacity: .7;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: .8px
        }

        .hero .km-display {
            font-family: 'DM Mono', monospace;
            font-size: 44px;
            font-weight: 500;
            cursor: pointer;
            min-height: 54px;
            display: flex;
            align-items: center;
            justify-content: center
        }

        .hero input[type=number] {
            background: transparent;
            color: inherit;
            font-family: 'DM Mono', monospace;
            font-size: 44px;
            font-weight: 500;
            text-align: center;
            width: 100%;
            border-bottom: 2px solid rgba(255, 255, 255, .3)
        }

        .hero input[type=number]::-webkit-inner-spin-button {
            -webkit-appearance: none
        }

        .hero .ghost-btn {
            margin-top: 14px;
            font-size: 12px;
            font-weight: 600;
            opacity: .55;
            cursor: pointer;
            transition: opacity 150ms ease;
            letter-spacing: .3px
        }

        .hero .ghost-btn:hover {
            opacity: .85
        }

        /* CHIPS ROW */
        .chips-row {
            display: flex;
            gap: 8px;
            margin-bottom: 16px
        }

        .chip {
            flex: 1;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 14px 10px;
            text-align: center;
            cursor: pointer;
            transition: all 150ms ease;
            box-shadow: var(--shadow)
        }

        .chip:hover {
            box-shadow: var(--shadow-md);
            border-color: var(--border-md)
        }

        .chip .num {
            font-family: 'DM Mono', monospace;
            font-size: 26px;
            font-weight: 500;
            display: block
        }

        .chip .chip-label {
            font-size: 11px;
            color: var(--muted);
            margin-top: 3px;
            font-weight: 600;
            letter-spacing: .2px
        }

        .chip.ok .num {
            color: var(--ok)
        }

        .chip.warn .num {
            color: var(--warn)
        }

        .chip.due .num {
            color: var(--due)
        }

        /* FORMS */
        .form-group {
            margin-bottom: 14px
        }

        .form-group label {
            display: block;
            font-size: 11px;
            font-weight: 700;
            color: var(--muted);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: .5px
        }

        .form-input {
            width: 100%;
            padding: 11px 13px;
            background: var(--surface-2);
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 14px;
            transition: all 150ms ease;
            font-weight: 500
        }

        .form-input:focus {
            border-color: var(--accent);
            background: var(--surface);
            outline: none;
            box-shadow: 0 0 0 3px rgba(107, 79, 53, 0.1)
        }

        .form-row {
            display: flex;
            gap: 10px
        }

        .form-row .form-group {
            flex: 1
        }

        .seg-control {
            display: flex;
            gap: 0;
            background: var(--surface-2);
            border-radius: var(--radius-sm);
            padding: 4px;
            overflow-x: auto;
            border: 1px solid var(--border)
        }

        .seg-btn {
            flex: 1;
            padding: 8px 6px;
            font-size: 11px;
            font-weight: 700;
            text-align: center;
            border-radius: 9px;
            cursor: pointer;
            transition: all 150ms ease;
            white-space: nowrap;
            color: var(--muted)
        }

        .seg-btn.active {
            background: var(--surface);
            color: var(--accent);
            box-shadow: 0 1px 4px rgba(44, 36, 22, .1)
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 12px 20px;
            border-radius: var(--radius-sm);
            font-size: 14px;
            font-weight: 700;
            transition: all 150ms ease;
            width: 100%;
            letter-spacing: .2px
        }

        .btn-primary {
            background: var(--accent);
            color: #FAF8F5;
            box-shadow: 0 3px 12px rgba(107, 79, 53, 0.25)
        }

        .btn-primary:active {
            transform: scale(.98);
            box-shadow: none
        }

        .btn-ghost {
            color: var(--text-2);
            border: 1.5px solid var(--border-md)
        }

        .btn-ghost:hover {
            background: var(--surface-2);
            border-color: var(--accent)
        }

        .btn-ghost:active {
            background: var(--surface-2)
        }

        .btn-danger {
            background: var(--due);
            color: #fff;
            box-shadow: 0 3px 10px rgba(192, 57, 43, 0.25)
        }

        .btn-sm {
            padding: 8px 14px;
            font-size: 12px;
            width: auto
        }

        .btn svg {
            width: 17px;
            height: 17px;
            flex-shrink: 0
        }

        /* REPUESTOS */
        .parts-toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin: 10px 0 14px
        }

        .parts-toolbar .section-title {
            margin: 0
        }

        .parts-toolbar .btn {
            width: auto;
            min-width: 100px
        }

        .part-card {
            padding: 16px;
            cursor: default
        }

        .part-head {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 12px;
            cursor: pointer;
            -webkit-user-select: none;
            user-select: none
        }

        .part-head .chevron {
            width: 18px;
            height: 18px;
            color: var(--muted);
            transition: transform 300ms ease;
            flex-shrink: 0
        }

        .part-head .chevron.open {
            transform: rotate(180deg)
        }

        .part-title {
            font-weight: 700;
            font-size: 16px;
            color: var(--text)
        }

        .part-sub {
            margin-top: 2px;
            font-size: 12px;
            color: var(--muted)
        }

        .part-empty {
            color: var(--muted);
            font-size: 12px;
            margin-top: 2px
        }

        .part-fields {
            margin-top: 4px
        }

        .part-extra-row {
            display: flex;
            gap: 8px;
            align-items: flex-start
        }

        .part-extra-row .form-group {
            flex: 1
        }

        .part-extra-row .del-btn {
            margin-top: 26px
        }

        .field-label-edit {
            width: 100%;
            padding: 0;
            margin-bottom: 6px;
            background: transparent;
            border: 0;
            color: var(--muted);
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .5px;
            outline: none
        }

        .field-label-edit:focus {
            color: var(--accent)
        }

        .part-record {
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            margin-bottom: 10px;
            overflow: hidden
        }

        .part-record-head {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px;
            cursor: pointer;
            -webkit-user-select: none;
            user-select: none
        }

        .part-record-body {
            padding: 0 12px 12px
        }

        .part-record-head .chevron {
            width: 16px;
            height: 16px;
            color: var(--muted);
            transition: transform 300ms ease;
            flex-shrink: 0
        }

        .part-record-head .chevron.open {
            transform: rotate(180deg)
        }

        /* TOGGLE */
        .toggle-wrap {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 8px 0
        }

        .toggle {
            width: 44px;
            height: 24px;
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: 12px;
            position: relative;
            cursor: pointer;
            transition: background 150ms ease
        }

        .toggle.on {
            background: var(--ok)
        }

        .toggle::after {
            content: '';
            position: absolute;
            top: 2px;
            left: 2px;
            width: 18px;
            height: 18px;
            background: var(--surface);
            border-radius: 50%;
            transition: transform 150ms ease;
            box-shadow: 0 1px 3px rgba(0, 0, 0, .15)
        }

        .toggle.on::after {
            transform: translateX(20px)
        }

        /* HISTORY LIST */
        .history-item {
            display: flex;

        let G, D, activeTab = 'resumen', expandedCards = {}, expandedParts = {}, openDropdown = null, editingBanner = false, editingMaint = null, editingFuel = null, newPartOpen = false, newPartDraft = null, editingPartCategory = null;

        function calcAvgConsumption() {
            const sorted = [...D.fuelLog].sort((a, b) => a.km - b.km);
            let total = 0, count = 0;
            for (let i = 1; i < sorted.length; i++) {
                if (sorted[i].fullTank && sorted[i - 1].fullTank) {
                    const dist = sorted[i].km - sorted[i - 1].km;
                    if (dist > 0) { total += (sorted[i].liters / dist) * 100; count++; }
                }
            }
            return count ? total / count : null;
        }

            const sorted = [...D.fuelLog].sort((a, b) => a.km - b.km);

        // EVENT DELEGATION
        document.addEventListener('click', e => {

                if (t.id === 'modal-print' || t.closest('#modal-print')) { window.print(); return; }

                    const text = $('#modal .modal-content')?.innerText || '';

            const file = e.target.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = ev => { D.photo = ev.target.result; save(); renderHeader(); setupPhotoLongPress(); toast('Foto actualizada'); };
            reader.readAsDataURL(file); e.target.value = '';
        });

        // Import JSON
        $('#import-input').addEventListener('change', e => {
            const file = e.target.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = ev => {
                try {
                    const parsed = JSON.parse(ev.target.result);
                    if (!parsed || typeof parsed !== 'object') throw new Error('invalid');
                    if (Array.isArray(parsed.vehicles)) {
                        G = normalizeGarage(parsed);
                        D = currentVehicle();
                    } else {
                        const imported = normalizeVehicleData(parsed);
                        imported.id = D.id;
                        D = imported;
                    }
                    resetViewStateForVehicle(); save(); renderAll(); toast('Datos importados');
                } catch (err) { toast('Error al importar'); }
            };
            reader.readAsText(file); e.target.value = '';
        });

        // INIT
        load();
        setTimeout(() => {
            renderAll();
            setupPhotoLongPress();
            $('#app').style.opacity = '1';
            $('#skeleton').classList.add('hide');
            setTimeout(() => $('#skeleton').style.display = 'none', 300);
        }, 200);

        // PWA
        if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(() => { });


    </script>
</body>

</html>
